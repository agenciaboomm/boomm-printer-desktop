name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.14)'
        required: false
        default: '0.1.14'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Sanity check source files
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          Write-Host "=== package.json version: $($pkg.version) ==="

          $renderer = Get-Content src\renderer\renderer.js -Raw
          $html     = Get-Content src\renderer\index.html  -Raw
          $api      = Get-Content src\services\api.js       -Raw
          $main     = Get-Content src\main.js               -Raw
          $jobs     = Get-Content src\services\job-processor.js -Raw

          $errors = @()

          if ($renderer -notmatch 'Parear Agora') { $errors += 'renderer.js: missing Parear Agora' }
          if ($html -notmatch 'acesso de impress') { $errors += 'index.html: missing Chave de acesso de impressao' }
          if ($html -notmatch 'v0\.1\.14') { $errors += 'index.html: version marker v0.1.14 not found' }
          if ($html -notmatch 'preserve-pairing-on-save') { $errors += 'index.html: build marker not found' }
          if ($api -notmatch '/functions/desktopApi') { $errors += 'api.js: desktopApi endpoint not found' }
          if ($api -match '/api/desktop/') { $errors += 'api.js: still uses deprecated /api/desktop/ routes' }
          if ($api -notmatch 'trigger-check-ready') { $errors += 'api.js: triggerCheckReady not found' }
          if ($pkg.version -ne '0.1.14') { $errors += "package.json version is $($pkg.version), expected 0.1.14" }
          if ($main -notmatch 'requiresPairing') { $errors += 'main.js: save-settings pairing preservation not found' }
          if ($main -notmatch 'keptPairing') { $errors += 'main.js: keptPairing result not found' }
          if ($main -notmatch '60000') { $errors += 'main.js: expected 60000ms cadence not found' }
          if ($main -notmatch '10000') { $errors += 'main.js: expected 10000ms default not found' }
          if ($jobs -notmatch '10000') { $errors += 'job-processor.js: expected 10000ms minimum not found' }
          if ($renderer -notmatch 'persisted_mismatch') { $errors += 'renderer.js: heartbeat debug not found' }
          if ($renderer -notmatch 'Pareamento mantido') { $errors += 'renderer.js: save feedback for kept pairing not found' }

          if ($errors.Count -gt 0) {
            Write-Error ("Source sanity check FAILED:`n" + ($errors -join "`n"))
            exit 1
          }
          Write-Host "All sanity checks passed for v$($pkg.version)."

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build

      - name: List dist directory
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist/ ==="
          Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length

      - name: Verify latest.yml was generated
        shell: pwsh
        run: |
          if (-not (Test-Path dist\latest.yml)) {
            Write-Error "latest.yml not found in dist/! Auto-update will not work."
            exit 1
          }
          Write-Host "latest.yml OK:"
          Get-Content dist\latest.yml

      - name: Generate SHA256
        id: sha256
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\BoommPrinterSetup-*.exe | Select-Object -First 1
          if ($exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
            "$hash  $($exe.Name)" | Out-File -FilePath dist\SHA256SUMS.txt -Encoding utf8
            Write-Host "SHA256: $hash"
            echo "sha256=$hash" >> $env:GITHUB_OUTPUT
            echo "exename=$($exe.Name)" >> $env:GITHUB_OUTPUT
            echo "exesize=$(($exe.Length / 1MB).ToString('F2')) MB" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No .exe found in dist/"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoommPrinterSetup
          path: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Set release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ github.event.inputs.version || '0.1.14' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Boomm Printer Desktop ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Boomm Printer Desktop ${{ steps.tag.outputs.tag }}

            App local Windows para impressão de etiquetas PDF/ZPL.

            ### Novidades nesta versão (v0.1.14)
            - Corrige o botão Salvar para não apagar o pareamento quando muda apenas nome/polling.
            - Mantém heartbeat, polling e fila ativos após salvar configurações simples.
            - Se URL do SaaS ou chave de acesso mudarem, o app informa que precisa parear novamente.
            - Força polling mínimo de 10 segundos para reduzir 429.
            - Mantém impressão, DANFE, etiqueta e renderização PDF sem alterações funcionais.

            ### Como confirmar
            - Header: v0.1.14 Desktop
            - Configurações: build: v0.1.14 | preserve-pairing-on-save

            ### Checksum SHA256
            ${{ steps.sha256.outputs.sha256 }}  BoommPrinterSetup-${{ steps.tag.outputs.version }}.exe

            Tamanho: ${{ steps.sha256.outputs.exesize }}
          files: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt

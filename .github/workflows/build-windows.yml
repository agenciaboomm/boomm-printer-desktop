name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.12)'
        required: false
        default: '0.1.12'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Download SumatraPDF portable
        shell: pwsh
        run: |
          $null = New-Item -ItemType Directory -Force -Path build\extraResources
          Invoke-WebRequest -Uri 'https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.exe' `
            -OutFile 'build\extraResources\SumatraPDF.exe'
          $size = (Get-Item 'build\extraResources\SumatraPDF.exe').Length
          Write-Host "SumatraPDF.exe downloaded: $size bytes"
          if ($size -lt 1MB) {
            Write-Error "SumatraPDF download parece inválido (< 1 MB)"
            exit 1
          }

      - name: Sanity check source files
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          Write-Host "=== package.json version: $($pkg.version) ==="

          $renderer = Get-Content src\renderer\renderer.js -Raw
          $html     = Get-Content src\renderer\index.html  -Raw
          $api      = Get-Content src\services\api.js       -Raw
          $printer  = Get-Content src\services\printer.js   -Raw

          $errors = @()

          if ($renderer -notmatch 'Parear Agora')            { $errors += 'renderer.js: missing Parear Agora' }
          if ($html     -notmatch 'acesso de impress')       { $errors += 'index.html: missing Chave de acesso de impressao' }
          if ($html     -notmatch 'v0\.1\.12')             { $errors += 'index.html: version marker v0.1.12 not found' }
          if ($api      -notmatch '/functions/desktopApi')   { $errors += 'api.js: desktopApi endpoint not found' }
          if ($api      -match    '/api/desktop/')           { $errors += 'api.js: still uses deprecated /api/desktop/ routes' }
          if ($api      -notmatch 'trigger-check-ready')     { $errors += 'api.js: triggerCheckReady not found' }
          if ($renderer -match    'v0\.1\.0 Desktop')       { $errors += 'renderer.js: hardcoded v0.1.0 found' }
          if ($html     -match    '>CHAVE DE API<')          { $errors += 'index.html: old label CHAVE DE API found' }
          if ($html     -match    'Chave de API[^a-z]')      { $errors += 'index.html: old text Chave de API found' }
          if ($pkg.version -ne '0.1.12')                    { $errors += "package.json version is $($pkg.version), expected 0.1.12" }
          if ($printer  -notmatch 'SumatraPDF')              { $errors += 'printer.js: SumatraPDF reference not found' }
          if ($printer  -notmatch 'getSumatraPdfPath')       { $errors += 'printer.js: getSumatraPdfPath not found' }
          if (-not (Test-Path 'build\extraResources\SumatraPDF.exe')) { $errors += 'SumatraPDF.exe not found in build/extraResources' }

          if ($errors.Count -gt 0) {
            Write-Host ""
            Write-Error ("Source sanity check FAILED:`n" + ($errors -join "`n"))
            exit 1
          }
          Write-Host "All sanity checks passed for v$($pkg.version)."

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build

      - name: List dist directory
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist/ ==="
          Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length

      - name: Verify latest.yml was generated
        shell: pwsh
        run: |
          if (-not (Test-Path dist\latest.yml)) {
            Write-Error "latest.yml not found in dist/! Auto-update will not work."
            exit 1
          }
          Write-Host "latest.yml OK:"
          Get-Content dist\latest.yml

      - name: Generate SHA256
        id: sha256
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\BoommPrinterSetup-*.exe | Select-Object -First 1
          if ($exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
            "$hash  $($exe.Name)" | Out-File -FilePath dist\SHA256SUMS.txt -Encoding utf8
            Write-Host "SHA256: $hash"
            echo "sha256=$hash" >> $env:GITHUB_OUTPUT
            echo "exename=$($exe.Name)" >> $env:GITHUB_OUTPUT
            echo "exesize=$(($exe.Length / 1MB).ToString('F2')) MB" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No .exe found in dist/"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoommPrinterSetup
          path: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Set release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ github.event.inputs.version || '0.1.12' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Boomm Printer Desktop ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Boomm Printer Desktop ${{ steps.tag.outputs.tag }}

            App local Windows para impressão de etiquetas PDF/ZPL.

            ### Novidades nesta versão (v0.1.12)
            - **Fix**: Impressão física via SumatraPDF CLI — abandona Shell.InvokeVerbEx que retornava sucesso falso
            - **Melhoria**: `SumatraPDF.exe -print-to "Impressora" -silent` entrega o job diretamente ao spooler do Windows
            - **Melhoria**: Exit code 0 = confirmação real de entrega ao spooler; qualquer outro código = erro com mensagem clara
            - **Melhoria**: SumatraPDF 3.5.2 bundled no instalador via `extraResources` — não requer instalação separada
            - **Mantido**: Caminho Microsoft Print to PDF → salvar em disco (`Downloads\Boomm Printer\`) inalterado
            - **Herdado de v0.1.11**: DANFE renderizado via Electron BrowserWindow; preload neutraliza `window.print()`

            ### Como confirmar que esta é a versão certa
            Após instalar, o app deve mostrar exatamente:
            - Header: **v0.1.12 Desktop**
            - Configurações → rodapé verde: `build: v0.1.12 | sumatra-physical-print`

            ### Instalação limpa (recomendado)
            1. Feche o app pela bandeja do sistema (botão direito → Sair)
            2. Desinstale a versão anterior em Configurações do Windows → Aplicativos → BoommPrinter
            3. Baixe e instale `BoommPrinterSetup-${{ steps.tag.outputs.version }}.exe` como Administrador

            ### Checksum SHA256
            ```
            ${{ steps.sha256.outputs.sha256 }}  BoommPrinterSetup-${{ steps.tag.outputs.version }}.exe
            ```
            **Tamanho:** ${{ steps.sha256.outputs.exesize }}
          files: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

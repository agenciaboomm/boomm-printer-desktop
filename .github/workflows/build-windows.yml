name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.4)'
        required: false
        default: '0.1.4'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Sanity check source files
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          Write-Host "=== package.json version: $($pkg.version) ==="

          $renderer = Get-Content src\renderer\renderer.js -Raw
          $html     = Get-Content src\renderer\index.html  -Raw
          $api      = Get-Content src\services\api.js       -Raw

          $errors = @()

          if ($renderer -notmatch 'Parear Agora')        { $errors += 'renderer.js: missing Parear Agora' }
          if ($html     -notmatch 'acesso de impress')   { $errors += 'index.html: missing Chave de acesso de impressao' }
          if ($api      -match    '/api/desktop/ping')   { $errors += 'api.js: still calls deprecated GET /api/desktop/ping' }
          if ($renderer -match    'v0\.1\.0 Desktop')   { $errors += 'renderer.js: hardcoded v0.1.0 Desktop found' }
          if ($html     -match    'v0\.1\.0 Desktop')   { $errors += 'index.html: hardcoded v0.1.0 Desktop found' }
          if ($html     -match    'CHAVE DE API"')       { $errors += 'index.html: old label CHAVE DE API found' }

          if ($errors.Count -gt 0) {
            Write-Host ""
            Write-Error ("Source sanity check FAILED:`n" + ($errors -join "`n"))
            exit 1
          }
          Write-Host "All sanity checks passed."

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build

      - name: List dist directory
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist/ ==="
          Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length

      - name: Verify latest.yml was generated
        shell: pwsh
        run: |
          if (-not (Test-Path dist\latest.yml)) {
            Write-Error "latest.yml not found in dist/! Auto-update will not work."
            exit 1
          }
          Write-Host "latest.yml OK:"
          Get-Content dist\latest.yml

      - name: Generate SHA256
        id: sha256
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\BoommPrinterSetup-*.exe | Select-Object -First 1
          if ($exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
            "$hash  $($exe.Name)" | Out-File -FilePath dist\SHA256SUMS.txt -Encoding utf8
            Write-Host "SHA256: $hash"
            echo "sha256=$hash" >> $env:GITHUB_OUTPUT
            echo "exename=$($exe.Name)" >> $env:GITHUB_OUTPUT
            echo "exesize=$(($exe.Length / 1MB).ToString('F2')) MB" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No .exe found in dist/"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoommPrinterSetup
          path: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Set release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ github.event.inputs.version || '0.1.4' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Boomm Printer Desktop ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Boomm Printer Desktop ${{ steps.tag.outputs.tag }}

            App local Windows para impressão de etiquetas PDF/ZPL com **atualização automática**.

            ### O que há nesta versão
            - UI correta: **Chave de acesso de impressão** + **Parear Agora**
            - Versão sempre dinâmica via `app.getVersion()` (sem hardcode)
            - Correção: Testar Conexão usa `POST /api/desktop/heartbeat` (não GET /ping)
            - Correção: inicialização não bloqueia se SaaS offline
            - Deeplink `boommprinter://pair?apiUrl=...&key=...` — abre e parea automaticamente
            - Protocolo `boommprinter://` registrado no Windows pelo instalador
            - Auto-update via `electron-updater` + `latest.yml`

            ### ⚠️ Instalação limpa (IMPORTANTE)
            Se já tiver uma versão anterior instalada:
            1. **Desinstale** a versão antiga em Configurações do Windows → Aplicativos
            2. Baixe `BoommPrinterSetup-${{ steps.tag.outputs.version }}.exe`
            3. Execute como **Administrador**
            4. Em **Configurações**: cole a URL do SaaS + Chave de acesso de impressão → **Parear Agora**

            ### Checksum SHA256
            ```
            ${{ steps.sha256.outputs.sha256 }}  BoommPrinterSetup-${{ steps.tag.outputs.version }}.exe
            ```
            **Tamanho:** ${{ steps.sha256.outputs.exesize }}
          files: |
            dist/BoommPrinterSetup-*.exe
            dist/latest.yml
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
